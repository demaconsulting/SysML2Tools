---
# SysML2Tools PNG Renderer System-Level Requirements
#
# PURPOSE:
# - Define system-level requirements for the DemaConsulting.SysML2Tools.Png system
# - System requirements are generic: they describe WHAT the PNG system delivers
# - Each system requirement decomposes downward (children) into the PngRenderer unit
#   requirements that provide the detailed rendering behaviour
# - System requirements are verified by system-level rendering integration tests

sections:
  - title: SysML2ToolsPng Requirements
    requirements:
      - id: SysML2Tools-Png-WritePngImage
        title: >-
          The PNG system shall render a laid-out diagram to a valid PNG image that
          represents the diagram's elements.
        justification: |
          Producing PNG output lets rendered diagrams be embedded in documents and web
          pages that require a raster image rather than vector graphics.
        children:
          - SysML2Tools-Png-PngRenderer-ImplementsIRenderer
          - SysML2Tools-Png-PngRenderer-RenderImage
          - SysML2Tools-Png-PngRenderer-RenderBox
          - SysML2Tools-Png-PngRenderer-RenderLabel
          - SysML2Tools-Png-PngRenderer-RenderLine
          - SysML2Tools-Png-PngRenderer-RenderNodeKinds
          - SysML2Tools-Png-PngRenderer-EndMarkers
        tests:
          - DiagramRenderer_RenderWorkspace_SoftwareStructureModel_PngRenderer_ReturnsPngOutput
          - DiagramRenderer_RenderWorkspace_GeneralViewModel_PngProducesValidOutput
