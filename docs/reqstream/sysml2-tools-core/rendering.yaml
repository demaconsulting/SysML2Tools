---
# Rendering Subsystem Requirements
#
# PURPOSE:
# - Define requirements for the SysML2Tools Rendering subsystem
# - IRenderer, ILayoutStrategy, Theme, RenderOptions, and DiagramRenderer define the
#   rendering pipeline interfaces
# - Requirements describe observable rendering behavior, not internal rendering algorithms

sections:
  - title: Rendering Subsystem Requirements
    requirements:
      - id: SysML2Tools-Core-Rendering-IRenderer
        title: >-
          The Rendering subsystem shall provide format renderers that each report the
          media type and the default file extension of the output they produce, and that
          write a laid-out diagram to a caller-supplied output stream according to the
          supplied render options.
        justification: |
          A common IRenderer contract allows the orchestrator (DiagramRenderer) and the
          CLI tool to treat SVG and PNG renderers uniformly. Callers can select a renderer
          by MediaType without depending on concrete renderer types, supporting future
          renderer additions without changing the orchestration logic.
        tests:
          - SvgRenderer_MediaType_IsImageSvgXml
          - SvgRenderer_DefaultExtension_IsDotSvg
          - PngRenderer_MediaType_IsImagePng
          - PngRenderer_DefaultExtension_IsDotPng

      - id: SysML2Tools-Core-Rendering-IRendererStateless
        title: >-
          A format renderer shall be pure and stateless and shall not access the
          filesystem, writing its output solely to the caller-supplied stream so it is
          safe to reuse and to invoke concurrently.
        justification: |
          Stateless renderers are safe to call concurrently from multiple threads and
          can be reused across multiple Render invocations without side effects. Prohibiting
          filesystem access ensures that renderers remain testable in-process with
          in-memory streams.
        tests:
          - SvgRenderer_Render_EmptyTree_WritesValidSvg
          - PngRenderer_Render_EmptyTree_WritesPngBytes

      - id: SysML2Tools-Core-Rendering-Theme
        title: >-
          The Rendering subsystem shall provide a theme that determines a diagram's
          complete appearance — including per-depth fill colors, stroke color and width,
          line corner radius, title and body font sizes, label padding, and connector stub
          and bend geometry — so that appearance is governed entirely by the selected theme.
        justification: |
          Centralizing all visual parameters in a Theme record allows the entire appearance
          of a rendered diagram to be changed by substituting a single object, without
          modifying any layout or rendering logic. All visual decisions are deferred to the
          Theme at render time.
        tests:
          - Themes_Light_IsInitialized
          - Themes_Dark_IsInitialized
          - Themes_Print_IsInitialized
          - Themes_HaveExpectedConnectorGeometry

      - id: SysML2Tools-Core-Rendering-ThemeApproachZone
        title: >-
          A theme shall define a connector approach zone — the clear distance a connector
          needs off a box face before bending — equal to the sum of its connector stub
          length, bend radius, and the supplied connector clearance.
        justification: |
          The approach zone is the clear distance a connector needs off a box face before bending;
          deriving it from the theme keeps connector geometry consistent across layout and routing.
        tests:
          - ConnectorApproachZone_SumsStubBendAndClearance

      - id: SysML2Tools-Core-Rendering-ThemeDepthWrap
        title: >-
          The renderer shall assign every box a valid fill color from the theme regardless
          of its nesting depth, cycling through the theme's depth fill colors so that boxes
          nested more deeply than the palette still receive a color.
        justification: |
          Modulo wrapping ensures that diagrams with nesting deeper than the theme's
          color palette never produce an index-out-of-range error. It also creates a
          natural visual cycle that helps readers distinguish nesting levels.
        tests:
          - Themes_Light_IsInitialized

      - id: SysML2Tools-Core-Rendering-RenderOptions
        title: >-
          The Rendering subsystem shall let callers supply render options — a theme, a
          scale factor defaulting to 1.0, an output resolution defaulting to 96 DPI, and a
          depth limit defaulting to 0 (meaning unlimited) — that govern how a diagram is produced.
        justification: |
          RenderOptions bundles all rendering parameters into one object passed to both
          ILayoutStrategy.BuildLayout and IRenderer.Render. A DepthLimit of 0 meaning
          unlimited is a conventional sentinel that avoids magic negative values.
        tests:
          - RenderOptions_DefaultScale_IsOne
          - RenderOptions_DefaultDpi_Is96
          - RenderOptions_DefaultDepthLimit_IsZero

      - id: SysML2Tools-Core-Rendering-ILayoutStrategy
        title: >-
          The Rendering subsystem shall compute, for a given view and set of render
          options, a fully resolved diagram layout in which every element position and
          every connector waypoint is determined before rendering.
        justification: |
          Separating layout computation from rendering allows different layout algorithms
          (e.g., hierarchical, force-directed) to produce the same LayoutTree representation
          consumed by any IRenderer implementation, maximizing reuse.
        tests:
          - ViewContext_Construction_StoresAllFields

      - id: SysML2Tools-Core-Rendering-DiagramRenderer
        title: >-
          For each view in a workspace, the Rendering subsystem shall lay the view out and
          render it, producing one rendered output per view.
        justification: |
          DiagramRenderer is the single orchestration point that wires together the
          layout and rendering pipeline. Centralizing this loop ensures consistent
          error handling and output collection across all views and all renderer types.
        tests:
          - DiagramRenderer_RenderWorkspace_NoViews_ReturnsEmptyList

      - id: SysML2Tools-Core-Rendering-RenderOutput
        title: >-
          For each rendered view, the Rendering subsystem shall produce an output carrying
          a suggested file name, the output's media type, and the rendered data stream, so
          that callers can persist or transmit the result without the renderer deciding
          where it goes.
        justification: |
          RenderOutput decouples the renderer from filesystem decisions. Callers receive
          a suggested file name and media type alongside the data stream and can write
          the output wherever they choose (file system, HTTP response, zip archive).
        tests:
          - RenderOutput_Construction_StoresAllFields

      - id: SysML2Tools-Core-Rendering-BuiltinThemes
        title: >-
          The Rendering subsystem shall provide at least three built-in themes: a light
          theme for screen display, a dark theme for dark-mode display, and a print theme
          for black-and-white output.
        justification: |
          Built-in themes allow callers to produce professional output without specifying
          every visual parameter. They also serve as reference values for testing and as
          starting points for custom theme derivation.
        tests:
          - Themes_Light_IsInitialized
          - Themes_Dark_IsInitialized
          - Themes_Print_IsInitialized
