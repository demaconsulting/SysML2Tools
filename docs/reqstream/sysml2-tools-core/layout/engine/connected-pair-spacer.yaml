---
# ConnectedPairSpacer Unit Requirements
#
# PURPOSE:
# - Define requirements for the ConnectedPairSpacer unit
# - ConnectedPairSpacer pushes connected box pairs apart so a visible approach zone remains
# - Requirements describe observable position properties, not the algorithm

sections:
  - title: ConnectedPairSpacer Unit Requirements
    requirements:
      - id: SysML2Tools-Core-Layout-Engine-ConnectedPairSpacer-Clearance
        title: >-
          ConnectedPairSpacer shall push each connected box pair apart along its dominant axis until
          the facing gap is at least twice the approach zone.
        justification: |
          A connector between two boxes that share a boundary edge is invisible; reserving two
          approach zones gives the connector room to step off each face and bend.
        tests:
          - Space_ZeroGapPair_PushedByTwoApproachZones

      - id: SysML2Tools-Core-Layout-Engine-ConnectedPairSpacer-OnlyConnected
        title: >-
          ConnectedPairSpacer shall leave unconnected box pairs and already-separated pairs unchanged.
        justification: |
          Spacing must only widen gaps that connectors need; unconnected boxes and pairs already past
          two approach zones must not move so the layout stays stable.
        tests:
          - Space_UnconnectedPair_Unmoved
          - Space_SeparatedPair_Unmoved

      - id: SysML2Tools-Core-Layout-Engine-ConnectedPairSpacer-Deterministic
        title: >-
          ConnectedPairSpacer shall produce identical positions for identical input.
        justification: |
          Reproducible spacing is required so regenerating a view from unchanged input does not shift
          boxes.
        tests:
          - Space_SameInput_IsDeterministic
