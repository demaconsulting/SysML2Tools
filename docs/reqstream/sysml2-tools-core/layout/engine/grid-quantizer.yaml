---
# GridQuantizer Unit Requirements
#
# PURPOSE:
# - Define requirements for the GridQuantizer unit
# - GridQuantizer snaps boxes to a grid and unifies aligned column widths and row heights
# - Requirements describe observable geometry properties, not the algorithm

sections:
  - title: GridQuantizer Unit Requirements
    requirements:
      - id: SysML2Tools-Core-Layout-Engine-GridQuantizer-Snap
        title: >-
          GridQuantizer shall snap each box position to the nearest multiple of the grid unit.
        justification: |
          Grid-aligned anchors give fine routing far fewer unique positions and make wire spacing
          exact, so positions must land on grid lines.
        tests:
          - Quantize_SnapsToNearestMultiple

      - id: SysML2Tools-Core-Layout-Engine-GridQuantizer-Unify
        title: >-
          GridQuantizer shall unify the extents of boxes that share a column or row to the widest
          member, never shrinking any box.
        justification: |
          Aligned blocks read better when exactly equal, and widening never introduces overlap, so
          a column's near-equal widths must become identical.
        tests:
          - Quantize_SimilarWidths_UnifiedToWider

      - id: SysML2Tools-Core-Layout-Engine-GridQuantizer-Isolation
        title: >-
          GridQuantizer shall not unify boxes that lie in different columns or rows.
        justification: |
          Global unification re-imposes a rigid shelf structure free layouts avoid; only aligned
          neighbours may be unified.
        tests:
          - Quantize_DifferentColumns_NotUnified

      - id: SysML2Tools-Core-Layout-Engine-GridQuantizer-Deterministic
        title: >-
          GridQuantizer shall produce identical rectangles for identical input.
        justification: |
          Reproducible quantisation is required so regenerating a view from unchanged input does
          not move boxes.
        tests:
          - Quantize_SameInput_IsDeterministic
