---
# HighwayAssigner Unit Requirements
#
# PURPOSE:
# - Define requirements for the HighwayAssigner unit
# - HighwayAssigner detects routing corridors, bundles wires, and classifies highways
# - Requirements describe observable corridor and assignment properties, not the algorithm

sections:
  - title: HighwayAssigner Unit Requirements
    requirements:
      - id: SysML2Tools-Core-Layout-Engine-HighwayAssigner-EmptyInput
        title: >-
          When given no boxes or no edges, HighwayAssigner shall return empty corridors,
          assignments, and cost multipliers.
        justification: |
          An empty graph is a valid degenerate case. The assigner must return a well-formed empty
          result rather than failing.
        tests:
          - HighwayAssigner_Assign_EmptyGraph_ReturnsEmpty

      - id: SysML2Tools-Core-Layout-Engine-HighwayAssigner-Corridor
        title: >-
          HighwayAssigner shall assign a single wire between two clusters to one corridor and shall
          not promote that corridor to a highway.
        justification: |
          A lone wire fits in an ordinary gap; reserving a trunk for it would waste space, so a
          single-wire corridor must remain a normal corridor.
        tests:
          - HighwayAssigner_Assign_TwoBoxesOneWire_OneCorridorNoHighway

      - id: SysML2Tools-Core-Layout-Engine-HighwayAssigner-Highway
        title: >-
          HighwayAssigner shall promote a corridor to a highway with a reserved width covering its
          peak concurrent wire count when several wires bundle through it.
        justification: |
          Dense fans must reserve enough width for every concurrent lane so bundled wires do not
          overlap, keeping the diagram readable.
        tests:
          - HighwayAssigner_Assign_SixBoxFan_PeakLanesAtLeastThreeAndHighway

      - id: SysML2Tools-Core-Layout-Engine-HighwayAssigner-CostMultiplier
        title: >-
          HighwayAssigner shall emit a routing cost multiplier below one for highway corridors and a
          neutral multiplier for ordinary corridors.
        justification: |
          The detailed router relies on a discount to bundle wires onto highways; ordinary corridors
          must stay neutral so cost is unbiased away from highways.
        tests:
          - HighwayAssigner_Assign_Multipliers_HighwayCheaperNormalNeutral
