---
# GravityCompressor Unit Requirements
#
# PURPOSE:
# - Define requirements for the GravityCompressor unit
# - GravityCompressor separates overlapping boxes to a minimum gap while leaving clear pairs alone
# - Requirements describe observable position properties, not the algorithm

sections:
  - title: GravityCompressor Unit Requirements
    requirements:
      - id: SysML2Tools-Core-Layout-Engine-GravityCompressor-NoOverlap
        title: >-
          GravityCompressor shall separate overlapping boxes so that every pair is clear by at
          least the requested minimum gap.
        justification: |
          Overlapping boxes hide one another; compression must guarantee clearance so the diagram
          stays readable.
        tests:
          - Compress_TwoOverlapping_SeparatedToMinGap

      - id: SysML2Tools-Core-Layout-Engine-GravityCompressor-Monotone
        title: >-
          GravityCompressor shall leave boxes already separated by the minimum gap unchanged.
        justification: |
          Compression must not disturb a clear arrangement; only colliding pairs may move so the
          result stays stable.
        tests:
          - Compress_Separated_Unchanged
          - Compress_ThreeChainOneOverlap_AdjustsOnlyThatGap

      - id: SysML2Tools-Core-Layout-Engine-GravityCompressor-Feasibility
        title: >-
          When a non-overlapping arrangement cannot be produced, GravityCompressor shall report the
          result as infeasible.
        justification: |
          Callers must be able to detect an impossible request rather than receive a silently
          overlapping layout.
        tests:
          - Compress_Impossible_ReturnsInfeasible

      - id: SysML2Tools-Core-Layout-Engine-GravityCompressor-Deterministic
        title: >-
          GravityCompressor shall produce identical positions for identical input.
        justification: |
          Reproducible compression is required so regenerating a view from unchanged input does not
          shift boxes.
        tests:
          - Compress_SameInput_IsDeterministic
