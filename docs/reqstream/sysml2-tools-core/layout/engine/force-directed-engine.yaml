---
# ForceDirectedEngine Unit Requirements
#
# PURPOSE:
# - Define requirements for the ForceDirectedEngine unit
# - ForceDirectedEngine arranges connected nodes into a spread-out, non-overlapping placement
# - Requirements describe observable placement properties, not the layout algorithm

sections:
  - title: ForceDirectedEngine Unit Requirements
    requirements:
      - id: SysML2Tools-Core-Layout-Engine-ForceDirectedEngine-NoOverlap
        title: >-
          ForceDirectedEngine shall position the supplied nodes so that no two node rectangles
          overlap.
        justification: |
          Overlapping boxes hide one another and make a diagram unreadable. Whatever spacing the
          caller requests, the final placement must leave every node rectangle disjoint from every
          other.
        tests:
          - Place_ConnectedGraph_ProducesNoOverlaps

      - id: SysML2Tools-Core-Layout-Engine-ForceDirectedEngine-WithinBounds
        title: >-
          ForceDirectedEngine shall place every node rectangle within the bounds of the region size
          it reports.
        justification: |
          Callers size the drawing surface from the reported region width and height. Every placed
          rectangle must therefore lie inside those bounds so that no node is clipped or drawn
          outside the canvas.
        tests:
          - Place_ConnectedGraph_AllRectsWithinBounds

      - id: SysML2Tools-Core-Layout-Engine-ForceDirectedEngine-Deterministic
        title: >-
          ForceDirectedEngine shall produce identical placements for identical inputs.
        justification: |
          Reproducible diagrams are required so that regenerating a view from unchanged input does
          not produce spurious differences in version control or review.
        tests:
          - Place_SameInput_IsDeterministic

      - id: SysML2Tools-Core-Layout-Engine-ForceDirectedEngine-EmptyInput
        title: >-
          When given no nodes, ForceDirectedEngine shall return an empty placement whose region
          consists solely of the requested padding.
        justification: |
          An empty graph is a valid degenerate case. The engine must return a well-formed, empty
          result sized only by the padding rather than failing.
        tests:
          - Place_EmptyList_ReturnsPaddingOnlyRegion

      - id: SysML2Tools-Core-Layout-Engine-ForceDirectedEngine-SingleNode
        title: >-
          When given a single node, ForceDirectedEngine shall place that node at the padding origin
          of the region.
        justification: |
          A lone node has no neighbors to balance against, so it must sit at a predictable origin
          offset by the requested padding rather than at an arbitrary position.
        tests:
          - Place_SingleNode_PositionsAtPadding
