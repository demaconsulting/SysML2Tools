---
# ActionFlowViewLayoutStrategy Unit Requirements
#
# PURPOSE:
# - Define requirements for the ActionFlowViewLayoutStrategy unit
# - ActionFlowViewLayoutStrategy lays out an Action Flow View diagram
# - Requirements describe observable diagram content, not the placement algorithm

sections:
  - title: ActionFlowViewLayoutStrategy Unit Requirements
    requirements:
      - id: SysML2Tools-Core-Layout-Internal-ActionFlowViewLayoutStrategy-Actions
        title: >-
          ActionFlowViewLayoutStrategy shall render a box for each action, a start marker entering
          the initial actions, a done marker leaving the final actions, and a flow arrow for each
          succession.
        justification: |
          An Action Flow View exists to show the actions of a behavior, where the flow starts and
          ends, and how control passes between actions. The action boxes, start and done markers,
          and flow arrows are the observable content the view must provide.
        tests:
          - ActionFlowView_BuildLayout_ActionsAndSuccessions_ProducesBoxesMarkersAndFlows

      - id: SysML2Tools-Core-Layout-Internal-ActionFlowViewLayoutStrategy-TopToBottom
        title: >-
          ActionFlowViewLayoutStrategy shall place the target action of a succession below its
          source action.
        justification: |
          Reading an action flow top-to-bottom is the diagram convention; placing each successor
          below its predecessor makes the direction of control flow immediately apparent.
        tests:
          - ActionFlowView_BuildLayout_Successions_FlowTopToBottom

      - id: SysML2Tools-Core-Layout-Internal-ActionFlowViewLayoutStrategy-EmptyCanvas
        title: >-
          When the workspace contains no action definition, ActionFlowViewLayoutStrategy shall
          return a minimal empty canvas with no nodes.
        justification: |
          With no action definition there is nothing to draw; a well-formed empty canvas lets the
          renderer produce a valid blank diagram rather than failing.
        tests:
          - ActionFlowView_BuildLayout_EmptyWorkspace_ReturnsMinimalCanvas

      - id: SysML2Tools-Core-Layout-Internal-ActionFlowViewLayoutStrategy-SuccessionLineStyle
        title: >-
          ActionFlowViewLayoutStrategy shall draw each succession flow edge as a dashed line with
          an open end marker at the target action.
        justification: |
          SysML v2 succession notation uses a dashed line with an open end marker. Applying these
          properties makes the rendered succession edges conform to the standard notation so that
          diagram readers can identify control flow at a glance.
        tests:
          - ActionFlowView_BuildLayout_SuccessionEdge_IsDashedWithOpenArrowhead

      - id: SysML2Tools-Core-Layout-Internal-ActionFlowViewLayoutStrategy-OrthogonalFlow
        title: >-
          ActionFlowViewLayoutStrategy shall place actions top-to-bottom along the succession flow,
          without overlapping action boxes, and route each succession as an orthogonal (axis-aligned)
          polyline.
        justification: |
          A directed top-to-bottom reading with non-overlapping boxes and orthogonal connectors makes
          the control flow of a behavior clear and matches the block-diagram visual style used across
          the tool.
        tests:
          - ActionFlowView_BuildLayout_ForwardChain_FlowsTopToBottomOrthogonally
          - ActionFlowView_BuildLayout_NoOverlap

      - id: SysML2Tools-Core-Layout-Internal-ActionFlowViewLayoutStrategy-BranchAndJoin
        title: >-
          ActionFlowViewLayoutStrategy shall render every action of a branching-and-joining flow, with
          the start marker entering only the actions that have no predecessor, the done marker leaving
          only the actions that have no successor, and a dashed open-marker succession for each edge.
        justification: |
          Behaviors commonly fork into parallel branches and merge again. Rendering all actions, the
          correct start and done attachments, and every succession ensures the diagram faithfully
          conveys the branch-and-join structure of the flow.
        tests:
          - ActionFlowView_BuildLayout_BranchAndJoin
          - ActionFlowView_BuildLayout_Cycle_IsBroken
