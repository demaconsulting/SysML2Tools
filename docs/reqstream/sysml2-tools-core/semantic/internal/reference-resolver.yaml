---
# ReferenceResolver Requirements
#
# PURPOSE:
# - Define requirements for the ReferenceResolver internal unit

sections:
  - title: ReferenceResolver Requirements
    requirements:
      - id: SysML2Tools-Core-Semantic-Internal-ReferenceResolver-Resolve
        title: >-
          ReferenceResolver.ResolveAll shall check each supertype name referenced by
          AST nodes against the symbol table and produce a Warning for any unresolved name.
        justification: |
          Unresolved references indicate model incompleteness. Reporting as Warnings allows
          the caller to continue analysis and provide partial results.
        tests:
          - WorkspaceLoader_LoadAsync_UnresolvedReference_ProducesWarning

      - id: SysML2Tools-Core-Semantic-Internal-ReferenceResolver-CircularImport
        title: >-
          ReferenceResolver.ResolveAll shall detect circular import chains in the import
          graph and produce a Warning diagnostic for each detected cycle.
        justification: |
          Circular imports must be detected to avoid infinite loops in reference resolution.
          The cycle detection uses depth-first search with a traversal stack.
        tests:
          - WorkspaceLoader_LoadAsync_CircularImport_ProducesWarningNoInfiniteLoop
