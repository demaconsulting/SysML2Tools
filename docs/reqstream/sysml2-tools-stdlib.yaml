---
# SysML2Tools Stdlib Library System-Level Requirements
#
# PURPOSE:
# - Define system-level requirements for the DemaConsulting.SysML2Tools.Stdlib system
# - System requirements are generic: they describe WHAT the Stdlib system delivers
# - Each system requirement decomposes downward (children) into the StdlibProvider unit
#   requirements that provide the detailed behaviour
# - System requirements are verified by system-level integration tests

sections:
  - title: SysML2Tools Stdlib Requirements
    requirements:
      - id: SysML2Tools-Stdlib-ProvideStandardLibrary
        title: >-
          The Stdlib system shall provide the pre-compiled SysML v2 standard library symbol table
          so that a workspace can be seeded without parsing the standard library source files.
        justification: |
          The SysML v2 and KerML standard library contains the base types user models reference.
          Delivering it pre-compiled and seeding it into a workspace eliminates the cold-start parse
          and makes the tool responsive at first use.
        children:
          - SysML2Tools-Stdlib-StdlibProvider-GetSymbolTable
          - SysML2Tools-Stdlib-StdlibProvider-Caching
          - SysML2Tools-Stdlib-StdlibProvider-Performance
          - SysML2Tools-Stdlib-StdlibProvider-Diagnostics
        tests:
          - WorkspaceLoader_LoadAsync_StdlibDeclarations_Registered
