---
# SysML2Tools SVG Renderer System-Level Requirements
#
# PURPOSE:
# - Define system-level requirements for the DemaConsulting.SysML2Tools.Svg system
# - System requirements are generic: they describe WHAT the SVG system delivers
# - Each system requirement decomposes downward (children) into the SvgRenderer unit
#   requirements that provide the detailed rendering behaviour
# - System requirements are verified by system-level rendering integration tests

sections:
  - title: SysML2ToolsSvg Requirements
    requirements:
      - id: SysML2Tools-Svg-WriteSvgDocument
        title: >-
          The SVG system shall render a laid-out diagram to a valid SVG document that
          represents the diagram's elements.
        justification: |
          Producing SVG output lets rendered diagrams be embedded in architecture
          documentation, viewed in any web browser, and version-controlled as text.
        children:
          - SysML2Tools-Svg-SvgRenderer-ImplementsIRenderer
          - SysML2Tools-Svg-SvgRenderer-RenderDocument
          - SysML2Tools-Svg-SvgRenderer-RenderBox
          - SysML2Tools-Svg-SvgRenderer-RenderLabel
          - SysML2Tools-Svg-SvgRenderer-RenderLine
          - SysML2Tools-Svg-SvgRenderer-RenderNodeKinds
          - SysML2Tools-Svg-SvgRenderer-EndMarkers
        tests:
          - DiagramRenderer_RenderWorkspace_SoftwareStructureModel_ReturnsSvgOutput
          - DiagramRenderer_RenderWorkspace_GeneralViewModel_SvgContainsElementNames
