---
# WorkspaceLoader Unit Requirements
#
# PURPOSE:
# - Define requirements for the WorkspaceLoader unit
# - WorkspaceLoader is the public entry point for semantic loading

sections:
  - title: WorkspaceLoader Unit Requirements
    requirements:
      - id: SysML2Tools-Language-Semantic-WorkspaceLoader-Load
        title: >-
          WorkspaceLoader.LoadAsync shall parse each user file asynchronously on the thread pool.
        justification: |
          Parallel parsing reduces wall-clock time for multi-file workspaces. The stdlib is
          parsed once and cached via a Lazy<Task<>> so concurrent callers share the result.
        tests:
          - WorkspaceLoader_LoadAsync_SinglePackage_RegistersDeclaration
          - WorkspaceLoader_LoadAsync_NestedPackages_RegistersQualifiedNames

      - id: SysML2Tools-Language-Semantic-WorkspaceLoader-FileError
        title: >-
          WorkspaceLoader.LoadAsync shall produce an Error diagnostic when a user file
          cannot be read from disk.
        justification: |
          A file-read failure prevents the workspace from being built for that file.
          Reporting it as an Error diagnostic allows callers to surface the problem to users.
        tests:
          - WorkspaceLoader_LoadAsync_UnreadableFile_ProducesErrorDiagnostic
