---
# SysmlNode AST Node Hierarchy Requirements
#
# PURPOSE:
# - Define requirements for the SysmlNode AST node hierarchy

sections:
  - title: SysmlNode Requirements
    requirements:
      - id: SysML2Tools-Language-Semantic-Internal-SysmlNode-Hierarchy
        title: >-
          SysmlNode shall define an abstract base class with Name, QualifiedName, Children,
          SupertypeNames, and ImportedNames properties shared by all AST node types.
        justification: |
          A common base class enables uniform traversal and registration of all AST nodes
          regardless of their specific element type.
        tests:
          - WorkspaceLoader_LoadAsync_SinglePackage_RegistersDeclaration

      - id: SysML2Tools-Language-Semantic-Internal-SysmlNode-Types
        title: >-
          The SysmlNode hierarchy shall include SysmlPackageNode, SysmlDefinitionNode,
          SysmlFeatureNode, SysmlImportNode, SysmlViewNode, SysmlViewpointNode,
          SysmlConnectionNode, and SysmlTransitionNode.
        justification: |
          Separate node types for packages, definitions, features, imports, views,
          viewpoints, connections, and transitions allow future analysis passes to dispatch
          on element type without string comparisons.
        tests:
          - WorkspaceLoader_LoadAsync_PartDef_RegistersDefinition
