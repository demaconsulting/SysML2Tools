<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <rect width="900" height="420" fill="white"/>
  <defs>
    <marker id="ah-dark" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#374151"/>
    </marker>
    <marker id="ah-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2563eb"/>
    </marker>
    <marker id="ah-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#7c3aed"/>
    </marker>
    <marker id="ah-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- Panel divider -->
  <line x1="450" y1="0" x2="450" y2="420" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Panel titles -->
  <text x="225" y="22" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#111827">Before: tangled routing</text>
  <text x="675" y="22" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#111827">After: highway corridors</text>

  <!-- ====== BEFORE PANEL ====== -->
  <!-- Left column: 1,2,3 -->
  <rect x="45" y="73" width="72" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="81" y="93" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e40af">Block 1</text>
  <rect x="45" y="193" width="72" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="81" y="213" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e40af">Block 2</text>
  <rect x="45" y="296" width="72" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="81" y="316" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e40af">Block 3</text>
  <!-- Right column: 4,5,6 -->
  <rect x="315" y="73" width="72" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="351" y="93" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e40af">Block 4</text>
  <rect x="315" y="193" width="72" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="351" y="213" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e40af">Block 5</text>
  <rect x="315" y="296" width="72" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="351" y="316" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e40af">Block 6</text>

  <!-- Messy edges (all dark gray) -->
  <line x1="117" y1="89" x2="315" y2="89" stroke="#374151" stroke-width="1.5" marker-end="url(#ah-dark)"/>
  <line x1="117" y1="94" x2="315" y2="316" stroke="#374151" stroke-width="1.5" marker-end="url(#ah-dark)"/>
  <line x1="315" y1="86" x2="117" y2="213" stroke="#374151" stroke-width="1.5" marker-end="url(#ah-dark)"/>
  <line x1="315" y1="92" x2="117" y2="316" stroke="#374151" stroke-width="1.5" marker-end="url(#ah-dark)"/>
  <line x1="315" y1="209" x2="117" y2="209" stroke="#374151" stroke-width="1.5" marker-end="url(#ah-dark)"/>
  <line x1="76" y1="225" x2="76" y2="296" stroke="#374151" stroke-width="1.5" marker-end="url(#ah-dark)"/>
  <line x1="356" y1="225" x2="356" y2="296" stroke="#374151" stroke-width="1.5" marker-end="url(#ah-dark)"/>

  <!-- ====== AFTER PANEL ====== -->
  <!-- Highway corridor (amber band) -->
  <rect x="610" y="48" width="70" height="335" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="645" y="40" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#92400e">Highway</text>

  <!-- Left column: 1,2,3 -->
  <rect x="495" y="73" width="72" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="531" y="93" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e40af">Block 1</text>
  <rect x="495" y="193" width="72" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="531" y="213" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e40af">Block 2</text>
  <rect x="495" y="296" width="72" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="531" y="316" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e40af">Block 3</text>
  <!-- Right column: 4,5,6 -->
  <rect x="762" y="73" width="72" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="798" y="93" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e40af">Block 4</text>
  <rect x="762" y="193" width="72" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="798" y="213" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e40af">Block 5</text>
  <rect x="762" y="296" width="72" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="798" y="316" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e40af">Block 6</text>

  <!-- ===== Bundle A (blue): ONE merged trunk crossing the corridor at y=82 =====
       Block 1 right face -> corridor right wall (one thick line, whole span)
       Fan-out happens in right stub area (x=680..762), NOT inside corridor -->
  <!-- Thick merged trunk: Block1 right face all the way to corridor right wall -->
  <line x1="567" y1="82" x2="680" y2="82" stroke="#2563eb" stroke-width="3"/>
  <!-- Comb spine in right stub area at x=680: fans to 1->4 (y=78) and 1->6 (y=88) -->
  <line x1="680" y1="78" x2="680" y2="88" stroke="#2563eb" stroke-width="1.5"/>
  <!-- 1->4: thin wire from comb tooth to Block 4 left face (arriving y=78, above center) -->
  <line x1="680" y1="78" x2="762" y2="78" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ah-blue)"/>
  <!-- 1->6: thin wire from comb tooth south to Block 6 level, then east -->
  <path d="M 680 88 V 312 H 762" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ah-blue)"/>
  <!-- Bundle A label inside corridor -->
  <text x="627" y="77" font-family="sans-serif" font-size="9" fill="#1d4ed8" font-weight="bold">A</text>

  <!-- ===== Bundle B (purple): ONE merged trunk crossing the corridor at y=100 =====
       Block 4 left face -> corridor left wall (one thick line, whole span)
       Fan-out happens in left stub area (x=567..610), NOT inside corridor -->
  <!-- Thick merged trunk: Block4 left face all the way to corridor left wall -->
  <line x1="762" y1="100" x2="610" y2="100" stroke="#7c3aed" stroke-width="3"/>
  <!-- Comb spine in left stub area at x=610: fans to 4->2 (y=96) and 4->3 (y=106) -->
  <line x1="610" y1="96" x2="610" y2="106" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- 4->2: thin wire south to Block 2, then west to Block 2 right face -->
  <path d="M 610 96 V 205 H 567" fill="none" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#ah-purple)"/>
  <!-- 4->3: thin wire south to Block 3, then west to Block 3 right face -->
  <path d="M 610 106 V 312 H 567" fill="none" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#ah-purple)"/>
  <!-- Bundle B label inside corridor -->
  <text x="627" y="116" font-family="sans-serif" font-size="9" fill="#6d28d9" font-weight="bold">B</text>

  <!-- 5->2 single crossing wire (gray, not bundled) -->
  <path d="M 762 213 H 567" fill="none" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#ah-gray)"/>
  <text x="645" y="204" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#6b7280">5&#x2192;2</text>

  <!-- Local wires outside highway -->
  <line x1="526" y1="225" x2="526" y2="296" stroke="#374151" stroke-width="1.5" marker-end="url(#ah-dark)"/>
  <line x1="803" y1="225" x2="803" y2="296" stroke="#374151" stroke-width="1.5" marker-end="url(#ah-dark)"/>

  <!-- Block 4 port annotation: blue arrives top, purple departs bottom -->
  <text x="758" y="69" text-anchor="end" font-family="sans-serif" font-size="7" fill="#2563eb">in (A)</text>
  <text x="758" y="110" text-anchor="end" font-family="sans-serif" font-size="7" fill="#7c3aed">out (B)</text>

  <!-- Legend -->
  <text x="458" y="400" font-family="sans-serif" font-size="9" fill="#1d4ed8">Bundle A: 1&#x2192;{4,6}</text>
  <text x="575" y="400" font-family="sans-serif" font-size="9" fill="#6d28d9">Bundle B: 4&#x2192;{2,3}</text>
  <text x="690" y="400" font-family="sans-serif" font-size="9" fill="#9ca3af">5&#x2192;2 (single wire)</text>
  <text x="808" y="400" font-family="sans-serif" font-size="9" fill="#374151">local wires</text>
</svg>
