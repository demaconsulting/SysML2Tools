<svg xmlns="http://www.w3.org/2000/svg" width="560" height="260" viewBox="0 0 560 260">
  <rect width="560" height="260" fill="white"/>
  <defs>
    <marker id="ah-dark" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#374151"/>
    </marker>
    <marker id="ah-blue" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#374151"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="280" y="16" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#111827">Directed Flow &#x2003;&#x3ba;&#x2095; = 1.0</text>

  <!-- Layer band shading -->
  <rect x="42" y="36" width="470" height="54" fill="#eff6ff" rx="2"/>
  <rect x="42" y="94" width="470" height="54" fill="#f8fafc" rx="2"/>
  <rect x="42" y="152" width="470" height="56" fill="#eff6ff" rx="2"/>

  <!-- Layer dividers -->
  <line x1="42" y1="92"  x2="512" y2="92"  stroke="#d1d5db" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="42" y1="150" x2="512" y2="150" stroke="#d1d5db" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Layer labels (left margin) -->
  <text x="4"  y="66"  font-family="sans-serif" font-size="9" fill="#374151">Layer</text>
  <text x="10" y="76"  font-family="sans-serif" font-size="9" fill="#374151">0</text>
  <text x="4"  y="124" font-family="sans-serif" font-size="9" fill="#374151">Layer</text>
  <text x="10" y="134" font-family="sans-serif" font-size="9" fill="#374151">1</text>
  <text x="4"  y="181" font-family="sans-serif" font-size="9" fill="#374151">Layer</text>
  <text x="10" y="191" font-family="sans-serif" font-size="9" fill="#374151">2</text>

  <!-- ═══ Forward edges (drawn before blocks) ═══ -->
  <!-- Layer 0 → Layer 1 -->
  <!-- B1(155,64)→B2(97,124): from bottom of B1 to top of B2 -->
  <line x1="155" y1="78" x2="97"  y2="110" stroke="#374151" stroke-width="1.2" marker-end="url(#ah-dark)"/>
  <!-- B1(155,64)→B3(252,124) -->
  <line x1="165" y1="78" x2="252" y2="110" stroke="#374151" stroke-width="1.2" marker-end="url(#ah-dark)"/>
  <!-- B5(360,64)→B3(252,124) -->
  <line x1="345" y1="78" x2="257" y2="110" stroke="#374151" stroke-width="1.2" marker-end="url(#ah-dark)"/>
  <!-- B5(360,64)→B6(422,124) -->
  <line x1="370" y1="78" x2="422" y2="110" stroke="#374151" stroke-width="1.2" marker-end="url(#ah-dark)"/>

  <!-- Layer 1 → Layer 2 -->
  <!-- B2(97,124)→B4(82,184) -->
  <line x1="97"  y1="138" x2="82"  y2="170" stroke="#374151" stroke-width="1.2" marker-end="url(#ah-dark)"/>
  <!-- B2(97,124)→B7(192,184) -->
  <line x1="107" y1="138" x2="192" y2="170" stroke="#374151" stroke-width="1.2" marker-end="url(#ah-dark)"/>
  <!-- B3(252,124)→B7(192,184) -->
  <line x1="242" y1="138" x2="197" y2="170" stroke="#374151" stroke-width="1.2" marker-end="url(#ah-dark)"/>
  <!-- B3(252,124)→B8(307,184) -->
  <line x1="262" y1="138" x2="307" y2="170" stroke="#374151" stroke-width="1.2" marker-end="url(#ah-dark)"/>
  <!-- B6(422,124)→B8(307,184) -->
  <line x1="407" y1="138" x2="317" y2="170" stroke="#374151" stroke-width="1.2" marker-end="url(#ah-dark)"/>
  <!-- B6(422,124)→B9(427,184) -->
  <line x1="422" y1="138" x2="427" y2="170" stroke="#374151" stroke-width="1.2" marker-end="url(#ah-dark)"/>

  <!-- ═══ Layer 0 blocks ═══ -->
  <rect x="115" y="50"  width="80" height="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="155" y="68"  text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">B1</text>

  <rect x="320" y="50"  width="80" height="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="360" y="68"  text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">B5</text>

  <!-- ═══ Layer 1 blocks ═══ -->
  <rect x="57"  y="110" width="80" height="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="97"  y="128" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">B2</text>

  <rect x="212" y="110" width="80" height="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="252" y="128" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">B3</text>

  <rect x="382" y="110" width="80" height="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="422" y="128" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">B6</text>

  <!-- ═══ Layer 2 blocks ═══ -->
  <rect x="52"  y="170" width="60" height="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="82"  y="188" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">B4</text>

  <rect x="162" y="170" width="60" height="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="192" y="188" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">B7</text>

  <rect x="277" y="170" width="60" height="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="307" y="188" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">B8</text>

  <rect x="397" y="170" width="60" height="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="427" y="188" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">B9</text>

  <!-- ═══ Back-edge arc: B9 (Layer 2) → B6 (Layer 1) ═══ -->
  <!-- Exits B9 right at (457,184), curves right to x=500, enters B6 right at (462,124) -->
  <path d="M457,184 C500,184 500,124 462,124" fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ah-dark)"/>
  <text x="508" y="158" font-family="sans-serif" font-size="9" fill="#374151">back-edge</text>
  <text x="508" y="169" font-family="sans-serif" font-size="9" fill="#374151">(loop)</text>

  <!-- Annotation -->
  <text x="280" y="244" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151" font-style="italic">&#x3ba;&#x2095; = 1.0 &#x2014; near-hard flow axis bias</text>

</svg>
