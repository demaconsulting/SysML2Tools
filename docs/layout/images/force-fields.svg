<svg xmlns="http://www.w3.org/2000/svg" width="640" height="310" viewBox="0 0 640 310">
  <rect width="640" height="310" fill="white"/>
  <defs>
    <marker id="ah-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2563eb"/>
    </marker>
    <marker id="ah-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#dc2626"/>
    </marker>
    <marker id="ah-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#7c3aed"/>
    </marker>
    <marker id="ah-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#16a34a"/>
    </marker>
    <marker id="ah-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#d97706"/>
    </marker>
    <marker id="ah-dark" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#374151"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="320" y="18" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#111827">Force Fields — Coarse Phase (Step 2)</text>

  <!-- Dense channel strip — clearly between Block A (right=300) and Block B (left=436) -->
  <rect x="350" y="82" width="20" height="145" fill="#fef9c3" stroke="#f59e0b" stroke-width="1"/>
  <text x="360" y="74" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#92400e">dense channel</text>

  <!-- Block B (upper right, connected) — left edge 436, clear gap from channel right=370 -->
  <rect x="436" y="68" width="88" height="36" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="480" y="87" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1f2937">Block B</text>
  <text x="480" y="99" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">(connected)</text>

  <!-- Block C (lower right, too close) -->
  <rect x="436" y="196" width="88" height="36" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="480" y="215" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1f2937">Block C</text>
  <text x="480" y="227" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">(too close)</text>

  <!-- Canvas centroid (green x) -->
  <line x1="78" y1="228" x2="94" y2="244" stroke="#16a34a" stroke-width="2.5"/>
  <line x1="94" y1="228" x2="78" y2="244" stroke="#16a34a" stroke-width="2.5"/>
  <text x="86" y="258" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#16a34a">centroid</text>

  <!-- Block A (central, highlighted) — moved left; right edge at 300, clear of channel at 350 -->
  <rect x="200" y="142" width="100" height="42" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="2" rx="2"/>
  <text x="250" y="168" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1f2937">Block A</text>

  <!-- ── Force 1: Affinity spring (blue) → NE toward Block B ── -->
  <!-- A right (300,163), B center (480,86). dir=(180,−77), unit=(0.919,−0.393). 70px → (364,135) -->
  <line x1="300" y1="163" x2="362" y2="135" stroke="#2563eb" stroke-width="2.5" marker-end="url(#ah-blue)"/>
  <!-- Label above the arrow, away from both Block A and channel -->
  <text x="306" y="115" font-family="sans-serif" font-size="10" font-weight="bold" fill="#2563eb">affinity spring</text>
  <text x="306" y="127" font-family="sans-serif" font-size="9" fill="#2563eb">r(w) = L * (1.5 - w)</text>

  <!-- ── Force 2: Block repulsion (red) → NW away from Block C ── -->
  <!-- C center (480,214). Away-from-C unit from A(250,163): (250-480,163-214)/|..| = (-230,-51)/236 = (-0.975,-0.216) -->
  <!-- Start A left (200,148). 70px: (200-68,148-15) = (132,133) -->
  <line x1="200" y1="148" x2="134" y2="133" stroke="#dc2626" stroke-width="2.5" marker-end="url(#ah-red)"/>
  <text x="20" y="108" font-family="sans-serif" font-size="10" font-weight="bold" fill="#dc2626">block repulsion</text>
  <text x="40" y="120" font-family="sans-serif" font-size="9" fill="#dc2626">k^2 / d^2</text>

  <!-- ── Force 3: Hierarchy gravity (purple) → S ── -->
  <line x1="250" y1="184" x2="250" y2="262" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#ah-purple)"/>
  <text x="258" y="224" font-family="sans-serif" font-size="10" font-weight="bold" fill="#7c3aed">hierarchy gravity</text>
  <text x="258" y="237" font-family="sans-serif" font-size="9" fill="#7c3aed">kh * delta-level * L / k</text>

  <!-- ── Force 4: Canvas gravity (green) → SW toward centroid ── -->
  <!-- Centroid (86,236). dir from A(250,163): (-164,73), unit=(-0.913,0.407). Start A lower-left(206,178). 70px: (206-64,178+28)=(142,206) -->
  <line x1="206" y1="178" x2="144" y2="206" stroke="#16a34a" stroke-width="2.5" marker-end="url(#ah-green)"/>
  <text x="20" y="194" font-family="sans-serif" font-size="10" font-weight="bold" fill="#16a34a">canvas gravity</text>
  <text x="36" y="206" font-family="sans-serif" font-size="9" fill="#16a34a">kc * d_centroid / k</text>

  <!-- ── Force 5: Wire pressure (amber, dashed) → W away from channel ── -->
  <line x1="200" y1="163" x2="126" y2="163" stroke="#d97706" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#ah-amber)"/>
  <text x="20" y="148" font-family="sans-serif" font-size="10" font-weight="bold" fill="#d97706">wire pressure</text>
  <text x="20" y="161" font-family="sans-serif" font-size="9" fill="#d97706">(annealed)  T(t) -&gt; 0</text>

</svg>
