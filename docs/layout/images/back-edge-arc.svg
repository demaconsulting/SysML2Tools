<svg xmlns="http://www.w3.org/2000/svg" width="420" height="300" viewBox="0 0 420 300">
  <rect width="420" height="300" fill="white"/>
  <defs>
    <marker id="ah-dark" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#374151"/>
    </marker>
      <marker id="ah-blue" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
        <polygon points="0 0,7 2.5,0 5" fill="#2563eb"/>
    </marker>
      <marker id="ah-dark-r" markerWidth="7" markerHeight="5" refX="1" refY="2.5" orient="auto">
        <polygon points="7 0,0 2.5,7 5" fill="#374151"/>
      </marker>
  </defs>

  <!-- Title -->
  <text x="100" y="14" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#111827">Back-Edge Arc Routing</text>

  <!-- ═══ Flow column ═══ -->
  <!-- Initial pseudo-state (filled circle) -->
  <circle cx="150" cy="32" r="8" fill="#111827"/>
  <!-- Connector: initial → State A -->
  <line x1="150" y1="40" x2="150" y2="48" stroke="#374151" stroke-width="1.5" marker-end="url(#ah-dark)"/>

  <!-- State A -->
  <rect x="100" y="48" width="100" height="30" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="150" y="67" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1f2937">State A</text>
  <!-- A → B -->
  <line x1="150" y1="78" x2="150" y2="106" stroke="#374151" stroke-width="1.5" marker-end="url(#ah-dark)"/>

  <!-- State B -->
  <rect x="100" y="106" width="100" height="30" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="150" y="125" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1f2937">State B</text>
  <!-- B → C -->
  <line x1="150" y1="136" x2="150" y2="164" stroke="#374151" stroke-width="1.5" marker-end="url(#ah-dark)"/>

  <!-- State C -->
  <rect x="100" y="164" width="100" height="30" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="150" y="183" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1f2937">State C</text>
  <!-- C → D -->
  <line x1="150" y1="194" x2="150" y2="222" stroke="#374151" stroke-width="1.5" marker-end="url(#ah-dark)"/>

  <!-- State D -->
  <rect x="100" y="222" width="100" height="30" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="150" y="241" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1f2937">State D</text>

  <!-- ═══ Back-edge arc 1: D → B  (depth 0, R = EC = 48) — blue, tighter ═══ -->
  <!-- Exits D right (200,237), curves right to peak x=248, enters B right (200,121) -->
  <path d="M200,237 C248,237 248,121 200,121"
        fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="5,4"
        marker-end="url(#ah-blue)"/>
  <!-- Label -->
  <text x="252" y="192" font-family="sans-serif" font-size="9" fill="#2563eb">back-edge</text>
  <text x="252" y="203" font-family="sans-serif" font-size="9" fill="#2563eb">depth 0</text>
  <text x="252" y="214" font-family="sans-serif" font-size="9" fill="#2563eb">R = EC</text>

  <!-- ═══ Back-edge arc 2: C → A  (depth 1, R = 2·EC = 96) — dark, wider ═══ -->
  <!-- Exits C right (200,179), curves right to peak x=296, enters A right (200,63) -->
  <path d="M200,179 C296,179 296,63 200,63"
        fill="none" stroke="#374151" stroke-width="2" stroke-dasharray="8,4"
        marker-end="url(#ah-dark)"/>
  <!-- Label -->
  <text x="300" y="128" font-family="sans-serif" font-size="9" fill="#374151">back-edge</text>
  <text x="300" y="139" font-family="sans-serif" font-size="9" fill="#374151">depth 1</text>
  <text x="300" y="150" font-family="sans-serif" font-size="9" fill="#374151">R = 2&#xb7;EC</text>

  <!-- ═══ Bracket annotations (bottom right) showing R and 2R ═══ -->
  <!-- R bracket -->
  <line x1="202" y1="262" x2="246" y2="262" stroke="#374151" stroke-width="1"
        marker-start="url(#ah-dark-r)" marker-end="url(#ah-dark)"/>
  <line x1="202" y1="258" x2="202" y2="266" stroke="#374151" stroke-width="1"/>
  <line x1="246" y1="258" x2="246" y2="266" stroke="#374151" stroke-width="1"/>
  <text x="224" y="258" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#374151">R = EC</text>

  <!-- 2R bracket -->
  <line x1="202" y1="276" x2="294" y2="276" stroke="#374151" stroke-width="1"
        marker-start="url(#ah-dark-r)" marker-end="url(#ah-dark)"/>
  <line x1="202" y1="272" x2="202" y2="280" stroke="#374151" stroke-width="1"/>
  <line x1="294" y1="272" x2="294" y2="280" stroke="#374151" stroke-width="1"/>
  <text x="248" y="272" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#374151">2R = 2&#xb7;EC</text>

  <!-- Vertical reference line from column edge to brackets -->
  <line x1="200" y1="252" x2="200" y2="283" stroke="#d1d5db" stroke-width="0.8" stroke-dasharray="2,2"/>

</svg>
