<svg xmlns="http://www.w3.org/2000/svg" width="840" height="355" viewBox="0 0 840 355">
  <rect width="840" height="355" fill="white"/>
  <defs>
    <marker id="ah-dark" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#374151"/>
    </marker>
    <marker id="ah-ind" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#059669"/>
    </marker>
    <marker id="ah-bun" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="420" y="22" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#111827">Highway Capacity Thresholds</text>

  <!-- Threshold ruler at top -->
  <rect x="60" y="32" width="200" height="12" rx="3" fill="#d1fae5"/>
  <text x="160" y="42" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#065f46">Normal (peak &#x2264; ~6)</text>
  <rect x="260" y="32" width="220" height="12" rx="3" fill="#fed7aa"/>
  <text x="370" y="42" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#92400e">Bundle Notation (peak &gt; ~6)</text>
  <rect x="480" y="32" width="220" height="12" rx="3" fill="#fecaca"/>
  <text x="590" y="42" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#991b1b">Two-Face Split (peak &gt; face_cap)</text>
  <!-- Ruler tick marks -->
  <line x1="60" y1="44" x2="60" y2="50" stroke="#374151" stroke-width="1"/>
  <text x="60" y="58" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#374151">0</text>
  <line x1="260" y1="44" x2="260" y2="50" stroke="#374151" stroke-width="1"/>
  <text x="260" y="58" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#374151">~6</text>
  <line x1="480" y1="44" x2="480" y2="50" stroke="#374151" stroke-width="1"/>
  <text x="480" y="58" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#374151">face_cap</text>
  <line x1="700" y1="44" x2="700" y2="50" stroke="#374151" stroke-width="1"/>

  <!-- Panel dividers -->
  <line x1="280" y1="60" x2="280" y2="310" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="560" y1="60" x2="560" y2="310" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Panel labels -->
  <text x="140" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#065f46">Normal</text>
  <text x="420" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#6d28d9">Bundle Notation</text>
  <text x="700" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#991b1b">Two-Face Split</text>

  <!-- ====== PANEL 1: Normal ====== -->
  <!-- Block A -->
  <rect x="28" y="100" width="60" height="100" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="58" y="155" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1e40af">A</text>
  <!-- Block B -->
  <rect x="188" y="100" width="60" height="100" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="218" y="155" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1e40af">B</text>
  <!-- Corridor -->
  <rect x="96" y="92" width="84" height="116" fill="#d1fae5" stroke="#059669" stroke-width="1.2"/>
  <!-- 3 individual wires -->
  <line x1="88" y1="138" x2="188" y2="138" stroke="#059669" stroke-width="1.5" marker-end="url(#ah-ind)"/>
  <line x1="88" y1="150" x2="188" y2="150" stroke="#059669" stroke-width="1.5" marker-end="url(#ah-ind)"/>
  <line x1="88" y1="162" x2="188" y2="162" stroke="#059669" stroke-width="1.5" marker-end="url(#ah-ind)"/>
  <text x="138" y="90" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#065f46">3 wires</text>
  <text x="140" y="232" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b7280">peak=3 &#x2264; ~6</text>
  <text x="140" y="244" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b7280">normal rendering</text>

  <!-- ====== PANEL 2: Bundle Notation ====== -->
  <!-- Block A -->
  <rect x="298" y="100" width="60" height="100" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="328" y="155" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1e40af">A</text>
  <!-- Block B -->
  <rect x="468" y="100" width="60" height="100" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="498" y="155" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1e40af">B</text>
  <!-- Corridor -->
  <rect x="366" y="92" width="94" height="116" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2"/>
  <!-- ONE thick bundle wire -->
  <line x1="358" y1="150" x2="468" y2="150" stroke="#7c3aed" stroke-width="4" marker-end="url(#ah-bun)"/>
  <!-- Bundle badge -->
  <rect x="393" y="136" width="28" height="16" rx="3" fill="white" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="407" y="148" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#6d28d9">x7</text>
  <text x="413" y="90" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6d28d9">bundle notation</text>
  <text x="420" y="232" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b7280">peak=7 &gt; ~6</text>
  <text x="420" y="244" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b7280">thick wire + xN label</text>

  <!-- ====== PANEL 3: Two-Face Split ====== -->
  <!-- Block A (taller, two corridors leave from it) -->
  <rect x="578" y="88" width="60" height="124" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="608" y="154" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1e40af">A</text>
  <!-- Block B (taller) -->
  <rect x="748" y="88" width="60" height="124" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="778" y="154" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1e40af">B</text>
  <!-- Upper corridor -->
  <rect x="646" y="96" width="94" height="48" fill="#fee2e2" stroke="#dc2626" stroke-width="1.2"/>
  <line x1="638" y1="116" x2="746" y2="116" stroke="#dc2626" stroke-width="2.5" marker-end="url(#ah-dark)"/>
  <rect x="673" y="106" width="28" height="16" rx="3" fill="white" stroke="#dc2626" stroke-width="1"/>
  <text x="687" y="118" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#991b1b">x6</text>
  <!-- Lower corridor -->
  <rect x="646" y="152" width="94" height="48" fill="#fee2e2" stroke="#dc2626" stroke-width="1.2"/>
  <line x1="638" y1="172" x2="746" y2="172" stroke="#dc2626" stroke-width="2.5" marker-end="url(#ah-dark)"/>
  <rect x="673" y="162" width="28" height="16" rx="3" fill="white" stroke="#dc2626" stroke-width="1"/>
  <text x="687" y="174" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#991b1b">x6</text>
  <!-- LayoutWarning badge -->
  <polygon points="608,64 618,84 598,84" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>
  <text x="608" y="80" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="white">!</text>
  <text x="608" y="60" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#92400e">LayoutWarning</text>
  <text x="700" y="232" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b7280">peak=12 &gt; face_cap</text>
  <text x="700" y="244" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b7280">two-face split + LayoutWarning</text>

  <!-- Formulas at bottom -->
  <text x="420" y="276" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">readability_cap &#x2248; 6 (cognitive threshold)   |   face_capacity = min(src_face_h, dst_face_h) / G   |   stub_min_len = ceil((N-1)/2) x G</text>
</svg>
