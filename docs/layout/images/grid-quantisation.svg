<svg xmlns="http://www.w3.org/2000/svg" width="520" height="230" viewBox="0 0 520 230">
  <rect width="520" height="230" fill="white"/>
  <defs>
    <marker id="ah-dark" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#374151"/>
    </marker>
    <marker id="ah-dark-r" markerWidth="7" markerHeight="5" refX="1" refY="2.5" orient="auto">
      <polygon points="7 0,0 2.5,7 5" fill="#374151"/>
    </marker>
    <!-- Fine dot grid pattern for "Before" panel (12px spacing, off-grid feel) -->
    <pattern id="fine-dots" x="6" y="6" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="0.7" fill="#d1d5db"/>
    </pattern>
    <!-- G-unit dot grid pattern for "After" panel (28px spacing) -->
    <pattern id="g-dots" x="276" y="40" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="1.4" fill="#94a3b8"/>
    </pattern>
  </defs>

  <!-- Panel titles -->
  <text x="125" y="16" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#111827">Before</text>
  <text x="395" y="16" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#111827">After: G-aligned</text>

  <!-- ════ LEFT PANEL ════ -->
  <!-- Fine background dot grid (blocks do NOT align to this) -->
  <rect x="4" y="28" width="246" height="188" fill="url(#fine-dots)"/>

  <!-- Connector lines (slightly off-grid / diagonal) -->
  <line x1="92"  y1="57" x2="141" y2="61" stroke="#374151" stroke-width="1"/>
  <line x1="27"  y1="73" x2="29"  y2="128" stroke="#374151" stroke-width="1"/>
  <line x1="172" y1="74" x2="175" y2="124" stroke="#374151" stroke-width="1"/>
  <line x1="95"  y1="142" x2="141" y2="138" stroke="#374151" stroke-width="1"/>

  <!-- Blocks (irregular sizes, off-grid positions) -->
  <rect x="22"  y="44"  width="69" height="27" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="56"  y="62"  text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">Block 1</text>

  <rect x="141" y="47"  width="65" height="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="173" y="65"  text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">Block 2</text>

  <rect x="25"  y="128" width="69" height="27" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="59"  y="146" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">Block 3</text>

  <rect x="141" y="124" width="66" height="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="174" y="142" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">Block 4</text>

  <!-- "Step 3 →" arrow between panels -->
  <line x1="250" y1="112" x2="270" y2="112" stroke="#374151" stroke-width="2" marker-end="url(#ah-dark)"/>
  <text x="260"  y="106" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="bold" fill="#374151">Step 3</text>

  <!-- Panel separator -->
  <line x1="260" y1="28" x2="260" y2="215" stroke="#9ca3af" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ════ RIGHT PANEL ════ -->
  <!-- G-unit background dot grid (blocks DO align to this); G = 28px -->
  <rect x="270" y="28" width="246" height="188" fill="url(#g-dots)"/>

  <!-- Connector lines (all routed through block centres, on grid) -->
  <!-- B1'(304,58) → B2'(420,58): horizontal at centre y -->
  <line x1="332" y1="58" x2="388" y2="58" stroke="#374151" stroke-width="1"/>
  <!-- B1'(304,58) → B3'(304,142): vertical at centre x -->
  <line x1="304" y1="72" x2="304" y2="128" stroke="#374151" stroke-width="1"/>
  <!-- B2'(420,58) → B4'(420,142): vertical at centre x -->
  <line x1="420" y1="72" x2="420" y2="128" stroke="#374151" stroke-width="1"/>
  <!-- B3'(304,142) → B4'(420,142): horizontal at centre y -->
  <line x1="332" y1="142" x2="388" y2="142" stroke="#374151" stroke-width="1"/>

  <!-- Blocks (G=28 aligned: 2G gaps between blocks) -->
  <!-- Block 1: x=276, y=44  right=332  bottom=72 -->
  <rect x="276" y="44"  width="56" height="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="304" y="62"  text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">Block 1</text>

  <!-- Block 2: x=388, y=44  gap from 332→388 = 56 = 2G -->
  <rect x="388" y="44"  width="56" height="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="416" y="62"  text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">Block 2</text>

  <!-- Block 3: x=276, y=128  gap from 72→128 = 56 = 2G -->
  <rect x="276" y="128" width="56" height="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="304" y="146" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">Block 3</text>

  <!-- Block 4: x=388, y=128 -->
  <rect x="388" y="128" width="56" height="28" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="416" y="146" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">Block 4</text>

  <!-- G unit annotation: one grid unit shown in the gap between blocks -->
  <line x1="332" y1="172" x2="360" y2="172" stroke="#374151" stroke-width="1"
        marker-start="url(#ah-dark-r)" marker-end="url(#ah-dark)"/>
  <line x1="332" y1="168" x2="332" y2="176" stroke="#374151" stroke-width="1"/>
  <line x1="360" y1="168" x2="360" y2="176" stroke="#374151" stroke-width="1"/>
  <text x="346" y="168" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#374151">G</text>

  <!-- "order preserved" note -->
  <text x="393" y="190" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151" font-style="italic">order preserved</text>
  <text x="393" y="201" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151" font-style="italic">&#x2014; no overlap possible</text>

</svg>
