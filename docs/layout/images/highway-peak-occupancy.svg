<svg xmlns="http://www.w3.org/2000/svg" width="560" height="375" viewBox="0 0 560 375">
  <rect width="560" height="375" fill="white"/>
  <defs>
    <marker id="ah-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="280" y="22" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#111827">Peak Concurrent Occupancy</text>

  <!-- Highway corridor (vertical amber band) -->
  <rect x="232" y="44" width="72" height="264" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="268" y="37" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#92400e">Highway</text>

  <!-- Block A (source, top right) -->
  <rect x="340" y="52" width="72" height="30" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="376" y="71" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1e40af">Block A</text>

  <!-- Block B (top left, taps off first) -->
  <rect x="140" y="96" width="72" height="30" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="176" y="115" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1e40af">Block B</text>

  <!-- Block C (mid left) -->
  <rect x="140" y="178" width="72" height="30" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="176" y="197" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1e40af">Block C</text>

  <!-- Block D (bottom left) -->
  <rect x="140" y="260" width="72" height="30" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="176" y="279" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1e40af">Block D</text>

  <!-- Merged trunk from Block A left face to corridor right wall -->
  <line x1="340" y1="67" x2="304" y2="67" stroke="#2563eb" stroke-width="3"/>

  <!-- Vertical trunk lines inside corridor (near right wall) -->
  <!-- All 3 lines from y=67 downward, tapering as wires tap off -->
  <!-- Section 1 (y=67 to y=111): 3 lines active -->
  <line x1="286" y1="67" x2="286" y2="111" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="293" y1="67" x2="293" y2="111" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="300" y1="67" x2="300" y2="111" stroke="#2563eb" stroke-width="1.5"/>
  <!-- Section 2 (y=111 to y=193): 2 lines remain (B tapped off) -->
  <line x1="293" y1="111" x2="293" y2="193" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="300" y1="111" x2="300" y2="193" stroke="#2563eb" stroke-width="1.5"/>
  <!-- Section 3 (y=193 to y=275): 1 line remains (C tapped off) -->
  <line x1="300" y1="193" x2="300" y2="275" stroke="#2563eb" stroke-width="1.5"/>

  <!-- Crown connector: trunk to vertical lines at top -->
  <line x1="286" y1="67" x2="304" y2="67" stroke="#2563eb" stroke-width="1.5"/>

  <!-- Tap-off wires exiting corridor left wall -->
  <!-- B taps off at y=111 -->
  <path d="M 286 111 H 212" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ah-blue)"/>
  <!-- C taps off at y=193 -->
  <path d="M 293 193 H 212" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ah-blue)"/>
  <!-- D taps off at y=275 -->
  <path d="M 300 275 H 212" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ah-blue)"/>

  <!-- Width brace annotations on LEFT of corridor -->
  <!-- Section 1 brace: y=67 to y=111 -->
  <line x1="227" y1="67" x2="227" y2="111" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="224" y1="67" x2="230" y2="67" stroke="#374151" stroke-width="1"/>
  <line x1="224" y1="111" x2="230" y2="111" stroke="#374151" stroke-width="1"/>
  <text x="220" y="93" text-anchor="end" font-family="sans-serif" font-size="10" fill="#374151">3G</text>

  <!-- Section 2 brace: y=111 to y=193 -->
  <line x1="227" y1="111" x2="227" y2="193" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="224" y1="193" x2="230" y2="193" stroke="#374151" stroke-width="1"/>
  <text x="220" y="157" text-anchor="end" font-family="sans-serif" font-size="10" fill="#374151">2G</text>

  <!-- Section 3 brace: y=193 to y=275 -->
  <line x1="227" y1="193" x2="227" y2="275" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="224" y1="275" x2="230" y2="275" stroke="#374151" stroke-width="1"/>
  <text x="220" y="239" text-anchor="end" font-family="sans-serif" font-size="10" fill="#374151">G</text>

  <!-- Active wire count annotations on RIGHT of corridor -->
  <text x="312" y="93" font-family="sans-serif" font-size="9" fill="#92400e">active=3</text>
  <text x="312" y="157" font-family="sans-serif" font-size="9" fill="#92400e">active=2</text>
  <text x="312" y="240" font-family="sans-serif" font-size="9" fill="#92400e">active=1</text>

  <!-- Tap-off event markers -->
  <text x="312" y="108" font-family="sans-serif" font-size="8" fill="#6b7280">B exits</text>
  <text x="312" y="191" font-family="sans-serif" font-size="8" fill="#6b7280">C exits</text>

  <!-- Formula annotations at bottom -->
  <text x="280" y="327" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#111827">reserved width = max(active wires) x G + 2&#xb7;margin</text>
  <text x="280" y="341" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#dc2626">NOT: total_edge_count x G + 2&#xb7;margin</text>
  <text x="280" y="357" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6b7280">Use sweep-line over entry/exit events: O(k log k) per bundle</text>
</svg>
