<svg xmlns="http://www.w3.org/2000/svg" width="680" height="240" viewBox="0 0 680 240">
  <rect width="680" height="240" fill="white"/>
  <defs>
    <marker id="ah-dark" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#374151"/>
    </marker>
    <marker id="ah-dark-r" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0,0 3,8 6" fill="#374151"/>
    </marker>
    <marker id="ah-compress" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#374151"/>
    </marker>
    <marker id="ah-red-in" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- ══ Panel labels ══ -->
  <text x="110" y="19" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#111827">Step 4: Oversized</text>
  <text x="340" y="19" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#111827">Compressing</text>
  <text x="570" y="19" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#111827">Step 6: Minimal</text>

  <!-- ══ Panel borders ══ -->
  <rect x="20"  y="25" width="180" height="185" fill="none" stroke="#d1d5db" stroke-width="1" rx="3"/>
  <rect x="250" y="25" width="180" height="185" fill="none" stroke="#d1d5db" stroke-width="1" rx="3"/>
  <rect x="480" y="25" width="180" height="185" fill="none" stroke="#d1d5db" stroke-width="1" rx="3"/>

  <!-- ══ PANEL 1 — Oversized (50 px gap) ══ -->
  <!-- Blocks -->
  <rect x="30"  y="45" width="52" height="22" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="56"  y="60" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">A</text>
  <rect x="132" y="45" width="52" height="22" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="158" y="60" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">B</text>
  <rect x="30"  y="117" width="52" height="22" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="56"  y="132" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">C</text>
  <rect x="132" y="117" width="52" height="22" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="158" y="132" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">D</text>
  <!-- Orthogonal connectors -->
  <line x1="82"  y1="56"  x2="132" y2="56"  stroke="#374151" stroke-width="1"/>
  <line x1="56"  y1="67"  x2="56"  y2="117" stroke="#374151" stroke-width="1"/>
  <line x1="158" y1="67"  x2="158" y2="117" stroke="#374151" stroke-width="1"/>
  <line x1="82"  y1="128" x2="132" y2="128" stroke="#374151" stroke-width="1"/>
  <!-- Horizontal gap indicator (between A and B) -->
  <line x1="82"  y1="155" x2="132" y2="155" stroke="#374151" stroke-width="1" marker-start="url(#ah-dark-r)" marker-end="url(#ah-dark)"/>
  <line x1="82"  y1="151" x2="82"  y2="159" stroke="#374151" stroke-width="1"/>
  <line x1="132" y1="151" x2="132" y2="159" stroke="#374151" stroke-width="1"/>
  <text x="107" y="168" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">3&#xd7; min</text>
  <!-- Vertical gap indicator (between A and C) -->
  <line x1="14" y1="67"  x2="14" y2="117" stroke="#374151" stroke-width="1" marker-start="url(#ah-dark-r)" marker-end="url(#ah-dark)"/>
  <line x1="10" y1="67"  x2="18" y2="67"  stroke="#374151" stroke-width="1"/>
  <line x1="10" y1="117" x2="18" y2="117" stroke="#374151" stroke-width="1"/>
  <text x="14" y="96" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151" transform="rotate(-90,14,92)">3&#xd7; min</text>

  <!-- ══ Compress arrow 1 ══ -->
  <line x1="206" y1="108" x2="246" y2="108" stroke="#374151" stroke-width="2" marker-end="url(#ah-compress)"/>
  <text x="226" y="103" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">compress</text>

  <!-- ══ PANEL 2 — Compressing (28 px gap) ══ -->
  <!-- Blocks -->
  <rect x="260" y="45" width="52" height="22" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="286" y="60" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">A</text>
  <rect x="340" y="45" width="52" height="22" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="366" y="60" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">B</text>
  <rect x="260" y="95" width="52" height="22" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="286" y="110" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">C</text>
  <rect x="340" y="95" width="52" height="22" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="366" y="110" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">D</text>
  <!-- Connectors -->
  <line x1="312" y1="56"  x2="340" y2="56"  stroke="#374151" stroke-width="1"/>
  <line x1="286" y1="67"  x2="286" y2="95"  stroke="#374151" stroke-width="1"/>
  <line x1="366" y1="67"  x2="366" y2="95"  stroke="#374151" stroke-width="1"/>
  <line x1="312" y1="106" x2="340" y2="106" stroke="#374151" stroke-width="1"/>
  <!-- Inward compression arrows (bold red, all 4 sides) -->
  <!-- Top -->
  <line x1="326" y1="34" x2="326" y2="43" stroke="#dc2626" stroke-width="2.5" marker-end="url(#ah-red-in)"/>
  <!-- Bottom -->
  <line x1="326" y1="130" x2="326" y2="121" stroke="#dc2626" stroke-width="2.5" marker-end="url(#ah-red-in)"/>
  <!-- Left -->
  <line x1="252" y1="81" x2="259" y2="81" stroke="#dc2626" stroke-width="2.5" marker-end="url(#ah-red-in)"/>
  <!-- Right -->
  <line x1="400" y1="81" x2="393" y2="81" stroke="#dc2626" stroke-width="2.5" marker-end="url(#ah-red-in)"/>

  <!-- ══ Compress arrow 2 ══ -->
  <line x1="436" y1="108" x2="476" y2="108" stroke="#374151" stroke-width="2" marker-end="url(#ah-compress)"/>
  <text x="456" y="103" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#374151">compress</text>

  <!-- ══ PANEL 3 — Minimal (12 px gap) ══ -->
  <!-- Blocks -->
  <rect x="490" y="50" width="52" height="22" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="516" y="65" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">A</text>
  <rect x="556" y="50" width="52" height="22" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="582" y="65" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">B</text>
  <rect x="490" y="84" width="52" height="22" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="516" y="99" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">C</text>
  <rect x="556" y="84" width="52" height="22" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="582" y="99" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1f2937">D</text>
  <!-- Connectors -->
  <line x1="542" y1="61"  x2="556" y2="61"  stroke="#374151" stroke-width="1"/>
  <line x1="516" y1="72"  x2="516" y2="84"  stroke="#374151" stroke-width="1"/>
  <line x1="582" y1="72"  x2="582" y2="84"  stroke="#374151" stroke-width="1"/>
  <line x1="542" y1="95"  x2="556" y2="95"  stroke="#374151" stroke-width="1"/>
  <!-- Horizontal gap indicator (between A and B, only 12 px) -->
  <line x1="542" y1="122" x2="556" y2="122" stroke="#374151" stroke-width="1" marker-start="url(#ah-dark-r)" marker-end="url(#ah-dark)"/>
  <line x1="542" y1="119" x2="542" y2="125" stroke="#374151" stroke-width="1"/>
  <line x1="556" y1="119" x2="556" y2="125" stroke="#374151" stroke-width="1"/>
  <!-- Leader line to label -->
  <line x1="549" y1="125" x2="549" y2="137" stroke="#374151" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="570" y="145" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">max(min&#x2c; N&#xd7;G</text>
  <text x="570" y="156" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#374151">+ 2&#xb7;margin)</text>

</svg>
