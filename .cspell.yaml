---
# Spell-Checking
#
# PURPOSE:
# - Maintain professional documentation and code quality
# - Catch spelling errors before publication
# - Support consistent technical terminology usage
# - Misspelled words should be fixed in the source
# - NEVER add a misspelled word to the 'words' list
# - PROPOSE only genuine technical terms/names as needed

version: "0.2"
language: en

# Project-specific technical terms and tool names
words:
  - ANTLR
  - ANTLR4
  - Antlr
  - antlr
  - Blockquotes
  - Postconditions
  - buildmark
  - buildtransitive
  - contentfiles
  - dcterms
  - DEMA
  - Dema
  - doctitle
  - docversion
  - errorlevel
  - fileassert
  - KEBNF
  - MBSE
  - xunit
  - nameof
  - pagetitle
  - Noto
  - Pandoc
  - Qube
  - reqstream
  - reviewmark
  - SARIF
  - sarifmark
  - setlocal
  - Skia
  - SkiaSharp
  - snupkg
  - sonarmark
  - Stdlib
  - stdlib
  - SysML2
  - SysML2Tools
  - Sysml
  - sysml
  - sysml2tools
  - kerml
  - KerML
  - supertypes
  - daltskin
  - interp
  - Dlanguage
  - uppercased
  - venv
  - versionmark
  - Weasyprint
  - yamlfix

# Exclude common build artifacts, dependencies, and vendored third-party code
ignorePaths:
  - "**/.git/**"
  - "**/node_modules/**"
  - "**/.venv/**"
  - "**/thirdparty/**"
  - "**/third-party/**"
  - "**/3rd-party/**"
  - "**/generated/**"
  - "**/Parser/Antlr/**"
  - "**/Stdlib/**"
  - "**/AGENT_REPORT_*.md"
  - "**/.agent-logs/**"
  - "**/bin/**"
  - "**/obj/**"
  - package-lock.json
