---
# ReviewMark Configuration File
# This file defines which files require review, where the evidence store is located,
# and how files are grouped into named review-sets following hierarchical scope principles.

# Patterns identifying all files that require review.
# Processed in order; prefix a pattern with '!' to exclude.
needs-review:
  - "README.md"                   # Root README file
  - "requirements.yaml"           # Root requirements file
  - "**/*.cs"                     # All C# source and test files
  - "docs/reqstream/**/*.yaml"    # Requirements files
  - "docs/design/**/*.md"         # Design documentation files
  - "docs/verification/**/*.md"   # Verification documentation files
  - "docs/user_guide/**/*.md"     # User guide documentation
  - "!**/obj/**"                  # Exclude build output
  - "!**/bin/**"                  # Exclude build output
  - "!node_modules/**"            # Exclude npm dependencies
  - "!**/.venv/**"                # Exclude Python virtual environment

# Evidence source: review data and index.json are located in the 'reviews' branch
# of this repository, accessed through the GitHub public HTTPS raw content access.
# Note: The 'reviews' branch must be created and populated with review evidence PDFs
# and an index.json before enforcement (--enforce flag) can be enabled in the pipeline.
evidence-source:
  type: url
  location: https://raw.githubusercontent.com/demaconsulting/SysML2Tools/reviews/index.json

# Context included for all reviews.
context:
  - docs/design/introduction.md

# Review sets following hierarchical scope principles.
# Each review-set focuses on a single compliance question with manageable file counts.
reviews:
  # Purpose
  - id: Purpose
    title: Review of user-facing capabilities and system promises
    context:
      - "!docs/design/introduction.md"
    paths:
      - "README.md"
      - "docs/user_guide/**/*.md"

  # Decomposition Review (only one per repository)
  - id: Decomposition
    title: Review that SysML2Tools Decomposition Addresses the Stated Purpose
    context:
      - README.md
      - "docs/user_guide/**/*.md"
    paths:
      - requirements.yaml
      - docs/design/introduction.md

  # TemplateTool - Specials
  - id: TemplateTool-Architecture
    title: Review of SysML2 Tools system architecture and operational validation
    context:
      - README.md
      - "docs/user_guide/**/*.md"
    paths:
      - "docs/reqstream/sysml2-tools.yaml"
      - "docs/design/introduction.md"
      - "docs/design/sysml2-tools.md"
      - "docs/verification/introduction.md"
      - "docs/verification/sysml2-tools.md"
      - "test/**/IntegrationTests.cs"

  - id: TemplateTool-Design
    title: Review of SysML2 Tools architectural and design consistency
    context:
      - docs/reqstream/sysml2-tools.yaml
    paths:
      - "docs/reqstream/sysml2-tools/platform-requirements.yaml"
      - "docs/design/introduction.md"
      - "docs/design/sysml2-tools/**/*.md"

  - id: TemplateTool-AllRequirements
    title: Review of SysML2 Tools requirements quality and traceability
    context:
      - docs/design/sysml2-tools.md
      - docs/reqstream/sysml2-tools.yaml
    paths:
      - "docs/reqstream/sysml2-tools/**/*.yaml"

  - id: OTS-Verification
    title: Review of OTS software verification evidence
    paths:
      - "docs/reqstream/ots/*.yaml"
      - "docs/design/ots.md"
      - "docs/design/ots/*.md"
      - "docs/verification/ots.md"
      - "docs/verification/ots/*.md"

  # TemplateTool - Program
  - id: TemplateTool-Program
    title: Review of SysML2 Tools Program unit implementation
    context:
      - docs/design/sysml2-tools.md
      - docs/reqstream/sysml2-tools.yaml
    paths:
      - "docs/reqstream/sysml2-tools/program.yaml"
      - "docs/design/sysml2-tools/program.md"
      - "docs/verification/sysml2-tools/program.md"
      - "src/**/Program.cs"
      - "test/**/ProgramTests.cs"

  # TemplateTool - Cli
  - id: TemplateTool-Cli
    title: Review of SysML2 Tools Cli subsystem architecture and interfaces
    context:
      - docs/design/sysml2-tools.md
      - docs/reqstream/sysml2-tools.yaml
    paths:
      - "docs/reqstream/sysml2-tools/cli.yaml"
      - "docs/design/sysml2-tools/cli.md"
      - "docs/verification/sysml2-tools/cli.md"
      - "test/**/Cli/CliSubsystemTests.cs"

  - id: TemplateTool-Cli-Context
    title: Review of SysML2 Tools Context unit implementation
    context:
      - docs/design/sysml2-tools.md
      - docs/reqstream/sysml2-tools.yaml
      - docs/design/sysml2-tools/cli.md
      - docs/reqstream/sysml2-tools/cli.yaml
    paths:
      - "docs/reqstream/sysml2-tools/cli/context.yaml"
      - "docs/design/sysml2-tools/cli/context.md"
      - "docs/verification/sysml2-tools/cli/context.md"
      - "src/**/Cli/Context.cs"
      - "test/**/Cli/ContextTests.cs"

  # TemplateTool - SelfTest
  - id: TemplateTool-SelfTest
    title: Review of SysML2 Tools SelfTest subsystem architecture and interfaces
    context:
      - docs/design/sysml2-tools.md
      - docs/reqstream/sysml2-tools.yaml
    paths:
      - "docs/reqstream/sysml2-tools/self-test.yaml"
      - "docs/design/sysml2-tools/self-test.md"
      - "docs/verification/sysml2-tools/self-test.md"
      - "test/**/SelfTest/SelfTestSubsystemTests.cs"

  - id: TemplateTool-SelfTest-Validation
    title: Review of SysML2 Tools Validation unit implementation
    context:
      - docs/design/sysml2-tools.md
      - docs/reqstream/sysml2-tools.yaml
      - docs/design/sysml2-tools/self-test.md
      - docs/reqstream/sysml2-tools/self-test.yaml
    paths:
      - "docs/reqstream/sysml2-tools/self-test/validation.yaml"
      - "docs/design/sysml2-tools/self-test/validation.md"
      - "docs/verification/sysml2-tools/self-test/validation.md"
      - "src/**/SelfTest/Validation.cs"
      - "test/**/SelfTest/ValidationTests.cs"

  # TemplateTool - Utilities
  - id: TemplateTool-Utilities
    title: Review of SysML2 Tools Utilities subsystem architecture and interfaces
    context:
      - docs/design/sysml2-tools.md
      - docs/reqstream/sysml2-tools.yaml
    paths:
      - "docs/reqstream/sysml2-tools/utilities.yaml"
      - "docs/design/sysml2-tools/utilities.md"
      - "docs/verification/sysml2-tools/utilities.md"
      - "test/**/Utilities/UtilitiesSubsystemTests.cs"

  - id: TemplateTool-Utilities-PathHelpers
    title: Review of SysML2 Tools PathHelpers unit implementation
    context:
      - docs/design/sysml2-tools.md
      - docs/reqstream/sysml2-tools.yaml
      - docs/design/sysml2-tools/utilities.md
      - docs/reqstream/sysml2-tools/utilities.yaml
    paths:
      - "docs/reqstream/sysml2-tools/utilities/path-helpers.yaml"
      - "docs/design/sysml2-tools/utilities/path-helpers.md"
      - "docs/verification/sysml2-tools/utilities/path-helpers.md"
      - "src/**/Utilities/PathHelpers.cs"
      - "test/**/Utilities/PathHelpersTests.cs"

  # OTS Items
  - id: OTS-BuildMark
    title: Review of BuildMark OTS verification evidence
    paths:
      - "docs/reqstream/ots/buildmark.yaml"
      - "docs/design/ots/buildmark.md"
      - "docs/verification/ots/buildmark.md"

  - id: OTS-FileAssert
    title: Review of FileAssert OTS verification evidence
    paths:
      - "docs/reqstream/ots/fileassert.yaml"
      - "docs/design/ots/fileassert.md"
      - "docs/verification/ots/fileassert.md"

  - id: OTS-Pandoc
    title: Review of Pandoc OTS verification evidence
    paths:
      - "docs/reqstream/ots/pandoc.yaml"
      - "docs/design/ots/pandoc.md"
      - "docs/verification/ots/pandoc.md"

  - id: OTS-ReqStream
    title: Review of ReqStream OTS verification evidence
    paths:
      - "docs/reqstream/ots/reqstream.yaml"
      - "docs/design/ots/reqstream.md"
      - "docs/verification/ots/reqstream.md"

  - id: OTS-ReviewMark
    title: Review of ReviewMark OTS verification evidence
    paths:
      - "docs/reqstream/ots/reviewmark.yaml"
      - "docs/design/ots/reviewmark.md"
      - "docs/verification/ots/reviewmark.md"

  - id: OTS-SarifMark
    title: Review of SarifMark OTS verification evidence
    paths:
      - "docs/reqstream/ots/sarifmark.yaml"
      - "docs/design/ots/sarifmark.md"
      - "docs/verification/ots/sarifmark.md"

  - id: OTS-SonarMark
    title: Review of SonarMark OTS verification evidence
    paths:
      - "docs/reqstream/ots/sonarmark.yaml"
      - "docs/design/ots/sonarmark.md"
      - "docs/verification/ots/sonarmark.md"

  - id: OTS-VersionMark
    title: Review of VersionMark OTS verification evidence
    paths:
      - "docs/reqstream/ots/versionmark.yaml"
      - "docs/design/ots/versionmark.md"
      - "docs/verification/ots/versionmark.md"

  - id: OTS-WeasyPrint
    title: Review of WeasyPrint OTS verification evidence
    paths:
      - "docs/reqstream/ots/weasyprint.yaml"
      - "docs/design/ots/weasyprint.md"
      - "docs/verification/ots/weasyprint.md"

  - id: OTS-xUnit
    title: Review of xUnit OTS verification evidence
    paths:
      - "docs/reqstream/ots/xunit.yaml"
      - "docs/design/ots/xunit.md"
      - "docs/verification/ots/xunit.md"
